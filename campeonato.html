<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CidadesFC</title>
<style>
:root{
  --bg:#0e0e10;--s1:#18181c;--s2:#222228;--s3:#2a2a32;
  --b1:rgba(255,255,255,.07);--b2:rgba(255,255,255,.13);
  --t1:#f0f0f2;--t2:#9090a0;--t3:#55556a;
  --gn:#22c97a;--gn2:rgba(34,201,122,.1);
  --rd:#e25555;--rd2:rgba(226,85,85,.1);
  --gd:#f5c842;--gd2:rgba(245,200,66,.1);
  --bl:#5b9cf6;--bl2:rgba(91,156,246,.1);
  --pu:#b07ef5;--pu2:rgba(176,126,245,.12);
  --r:8px;--rl:12px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--t1);font-family:'Segoe UI',system-ui,sans-serif;font-size:14px;min-height:100vh;}

.topbar{background:var(--s1);border-bottom:1px solid var(--b1);padding:0 18px;display:flex;align-items:stretch;position:sticky;top:0;z-index:200;}
.brand{font-size:14px;font-weight:700;color:var(--t1);padding:12px 14px 12px 0;display:flex;align-items:center;gap:6px;border-right:1px solid var(--b1);margin-right:6px;white-space:nowrap;}
.brand span{color:var(--gd);}
.state-tab{padding:0 14px;font-size:13px;font-weight:500;color:var(--t2);cursor:pointer;border-bottom:2px solid transparent;display:flex;align-items:center;transition:all .15s;white-space:nowrap;}
.state-tab:hover{color:var(--t1);}
.state-tab.active{color:var(--gd);border-bottom-color:var(--gd);}
.state-tab.reg{color:var(--pu);}
.state-tab.reg.active{color:var(--pu);border-bottom-color:var(--pu);}
.top-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.pill{font-size:11px;color:var(--t2);background:var(--s2);border:1px solid var(--b1);padding:3px 10px;border-radius:20px;white-space:nowrap;}
.pill.gd{color:var(--gd);}

.main{display:grid;grid-template-columns:210px 1fr;}
.sidebar{background:var(--s1);border-right:1px solid var(--b1);padding:10px 8px;display:flex;flex-direction:column;gap:3px;position:sticky;top:49px;height:calc(100vh - 49px);overflow-y:auto;}
.sec-lbl{font-size:10px;font-weight:600;letter-spacing:.08em;color:var(--t3);text-transform:uppercase;padding:8px 8px 3px;}
.nav-item{display:flex;align-items:center;gap:7px;padding:7px 9px;border-radius:var(--r);cursor:pointer;color:var(--t2);font-size:13px;border:1px solid transparent;transition:all .13s;user-select:none;}
.nav-item:hover{background:var(--s2);color:var(--t1);}
.nav-item.active{background:var(--s2);color:var(--t1);border-color:var(--b2);}
.nav-item .rbadge{margin-left:auto;font-size:10px;color:var(--t3);background:var(--s3);padding:1px 6px;border-radius:10px;}
.nav-item.active .rbadge{color:var(--t2);}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.sep{height:1px;background:var(--b1);margin:4px 0;}
.ctrl{padding:6px;display:flex;flex-direction:column;gap:5px;}
.spd-lbl{font-size:10px;color:var(--t3);text-align:center;}
.spd-row{display:flex;gap:3px;}
.spd{flex:1;padding:4px 2px;border-radius:6px;border:1px solid var(--b1);background:transparent;color:var(--t2);font-size:10px;cursor:pointer;transition:all .13s;}
.spd.on,.spd:hover{background:var(--s2);color:var(--t1);border-color:var(--b2);}
.btn{width:100%;padding:7px 10px;border-radius:var(--r);border:1px solid var(--b2);background:var(--s2);color:var(--t1);font-size:12px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:all .13s;}
.btn:hover:not(:disabled){background:var(--s3);border-color:rgba(255,255,255,.2);}
.btn:disabled{opacity:.3;cursor:not-allowed;}
.btn-gd{background:var(--gd2);border-color:rgba(245,200,66,.3);color:var(--gd);}
.btn-gd:hover:not(:disabled){background:rgba(245,200,66,.2);}
.btn-gn{background:var(--gn2);border-color:rgba(34,201,122,.3);color:var(--gn);}
.btn-gn:hover:not(:disabled){background:rgba(34,201,122,.2);}
.btn-pu{background:var(--pu2);border-color:rgba(176,126,245,.3);color:var(--pu);}
.rnd-hint{text-align:center;font-size:11px;color:var(--t3);}
.rnd-hint strong{color:var(--t2);}
.vh{display:none!important;}

.content{padding:16px;overflow-y:auto;min-height:calc(100vh - 49px);}

/* TICKER */
.ticker{background:var(--s1);border:1px solid var(--b1);border-radius:var(--rl);padding:12px 14px;margin-bottom:14px;display:none;}
.ticker.on{display:block;}
.tck-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.tck-clock{font-size:22px;font-weight:700;color:var(--gd);font-family:monospace;}
.tck-dlbl{font-size:10px;color:var(--t3);font-weight:600;letter-spacing:.06em;text-transform:uppercase;margin-bottom:2px;}
.tck-match{display:flex;align-items:center;justify-content:center;gap:10px;font-size:15px;margin-bottom:8px;}
.tck-team{flex:1;text-align:right;font-weight:500;}
.tck-team.aw{text-align:left;}
.tck-score{font-size:26px;font-weight:700;font-family:monospace;color:var(--t1);background:var(--s2);border:1px solid var(--b1);padding:3px 14px;border-radius:var(--r);min-width:76px;text-align:center;}
.tck-bar{height:3px;background:var(--s2);border-radius:99px;overflow:hidden;margin-bottom:7px;}
.tck-fill{height:100%;background:var(--gd);border-radius:99px;transition:width .08s linear;}
.gfeed{max-height:60px;overflow-y:auto;display:flex;flex-direction:column;gap:3px;}
.gev{display:flex;align-items:center;gap:6px;font-size:11px;padding:3px 7px;background:var(--gd2);border-radius:5px;border-left:2px solid var(--gd);animation:fi .2s ease;}
@keyframes fi{from{opacity:0;transform:translateY(-3px)}to{opacity:1;transform:translateY(0)}}
.gmin{color:var(--gd);font-weight:700;min-width:26px;font-family:monospace;}

/* GRID */
.grid-mode{display:none;margin-bottom:14px;}
.grid-mode.on{display:block;}
.gm-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;}
.gm-clock{font-size:18px;font-weight:700;color:var(--gd);font-family:monospace;}
.gm-bar{height:3px;background:var(--s2);border-radius:99px;overflow:hidden;margin-bottom:10px;}
.gm-fill{height:100%;background:var(--gd);border-radius:99px;transition:width .08s linear;}
.mini-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:6px;}
.mc{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);padding:8px 10px;}
.mc-top{display:flex;justify-content:space-between;margin-bottom:4px;}
.mc-dlbl{font-size:9px;color:var(--t3);font-weight:600;}
.mc-t{font-size:10px;color:var(--gd);font-family:monospace;font-weight:600;}
.mc-teams{display:flex;align-items:center;gap:4px;}
.mc-name{flex:1;font-size:11px;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mc-name.r{text-align:right;}
.mc-sc{font-size:13px;font-weight:700;color:var(--t1);font-family:monospace;min-width:30px;text-align:center;}
.mc-bar{height:2px;background:var(--s2);border-radius:99px;margin-top:5px;overflow:hidden;}
.mc-fill{height:100%;background:var(--gd);border-radius:99px;}
.mc-feed{margin-top:4px;max-height:44px;overflow-y:auto;display:flex;flex-direction:column;gap:2px;}
.mc-gev{font-size:9px;color:var(--t2);padding:1px 0;border-left:1px solid var(--gd);padding-left:4px;animation:fi .2s ease;}

/* STANDINGS LAYOUT */
.slay{display:grid;grid-template-columns:1fr 260px;gap:16px;align-items:start;}
@media(max-width:900px){.slay{grid-template-columns:1fr;}}
.div-hdr{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.div-dot-lg{width:9px;height:9px;border-radius:50%;}
.div-title{font-size:15px;font-weight:600;}
.leg{display:flex;gap:10px;margin-bottom:7px;flex-wrap:wrap;}
.leg-item{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--t3);}
.leg-dot{width:6px;height:6px;border-radius:50%;}
.tbl-wrap{background:var(--s1);border:1px solid var(--b1);border-radius:var(--rl);overflow:hidden;}
table{width:100%;border-collapse:collapse;}
thead th{padding:6px 7px;font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;text-align:center;background:var(--s2);border-bottom:1px solid var(--b1);}
thead th.nc{text-align:left;padding-left:10px;}
thead th.pc{width:26px;}
tbody td{padding:5px 7px;text-align:center;font-size:12px;font-variant-numeric:tabular-nums;color:var(--t2);border-bottom:1px solid var(--b1);}
tbody tr:last-child td{border-bottom:none;}
tbody td.nc{text-align:left;padding-left:0;color:var(--t1);font-weight:500;}
tbody td.ptsc{font-weight:700;color:var(--t1);}
tbody td.posc{color:var(--t3);font-weight:600;padding:5px 4px;}
.rpu{background:rgba(176,126,245,.06);}
.rp{background:rgba(34,201,122,.05);}
.rr{background:rgba(226,85,85,.05);}
.bpu{border-left:2px solid var(--pu);}
.bp{border-left:2px solid var(--gn);}
.br{border-left:2px solid var(--rd);}
.bn{border-left:2px solid transparent;}
.sgp{color:var(--gn);}
.sgn{color:var(--rd);}

/* FIXTURES PANEL */
.fix-panel{background:var(--s1);border:1px solid var(--b1);border-radius:var(--rl);overflow:hidden;}
.fix-hdr{background:var(--s2);padding:8px 12px;font-size:11px;font-weight:600;color:var(--t2);border-bottom:1px solid var(--b1);}
.fix-round{font-size:10px;color:var(--t3);font-weight:400;}
.fix-list{overflow-y:auto;}
.fix-item{display:grid;grid-template-columns:1fr auto 1fr;gap:6px;align-items:center;padding:6px 12px;border-bottom:1px solid var(--b1);font-size:11px;}
.fix-item:last-child{border-bottom:none;}
.fix-home{text-align:right;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.fix-vs{color:var(--t3);font-size:10px;white-space:nowrap;}
.fix-away{color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* FILTER BAR */
.filter-bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center;}
.filter-label{font-size:11px;color:var(--t3);}
.filter-select{background:var(--s2);border:1px solid var(--b2);color:var(--t1);font-size:12px;padding:5px 10px;border-radius:var(--r);cursor:pointer;}
.filter-select:focus{outline:none;border-color:var(--gd);}

/* RESULTS */
.res-sec{margin-bottom:14px;}
.res-dlbl{font-size:10px;font-weight:600;color:var(--t3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;}
.res-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:5px;}
.rc{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);padding:8px 10px;}
.rc-row{display:grid;grid-template-columns:1fr auto 1fr;gap:5px;align-items:center;}
.rc-n{font-size:11px;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:right;}
.rc-n.aw{text-align:left;}
.rc-sc{font-size:12px;font-weight:700;color:var(--t1);background:var(--s2);border:1px solid var(--b1);padding:2px 7px;border-radius:5px;white-space:nowrap;font-family:monospace;text-align:center;}
.rc-w{color:var(--gn);}

/* ARTILHARIA */
.art-filter{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.art-ftab{padding:5px 12px;border-radius:20px;border:1px solid var(--b1);background:transparent;color:var(--t2);font-size:12px;cursor:pointer;transition:all .13s;}
.art-ftab.on{background:var(--s2);color:var(--t1);border-color:var(--b2);}
.art-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.art-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--rl);overflow:hidden;}
.art-hdr{background:var(--s2);padding:7px 12px;font-size:11px;font-weight:600;color:var(--t2);border-bottom:1px solid var(--b1);}
.art-row{display:flex;align-items:center;gap:8px;padding:6px 12px;border-bottom:1px solid var(--b1);font-size:12px;}
.art-row:last-child{border-bottom:none;}
.art-pos{color:var(--t3);font-weight:600;width:18px;text-align:center;flex-shrink:0;font-size:11px;}
.art-info{flex:1;min-width:0;}
.art-nick{color:var(--t1);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.art-sub{font-size:10px;color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.art-val{font-weight:700;color:var(--gd);min-width:20px;text-align:center;font-size:13px;}
.art-val.gn{color:var(--gn);}

/* HISTORICO */
.hist-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--rl);overflow:hidden;margin-bottom:12px;}
.hist-hdr{background:var(--s2);padding:8px 12px;font-size:12px;font-weight:600;color:var(--t2);border-bottom:1px solid var(--b1);}
.hist-row{display:flex;justify-content:space-between;padding:6px 12px;border-bottom:1px solid var(--b1);font-size:11px;gap:8px;}
.hist-row:last-child{border-bottom:none;}
.hist-lbl{color:var(--t3);}
.hist-val{color:var(--t1);text-align:right;}
.hist-val.gd{color:var(--gd);font-weight:600;}
.hist-val.gn{color:var(--gn);}
.hist-val.rd{color:var(--rd);}

/* REGIONAL */
.reg-info-box{font-size:12px;color:var(--t2);padding:10px 14px;background:var(--s2);border-radius:var(--r);margin-bottom:14px;line-height:1.6;}
.reg-matches{display:flex;flex-direction:column;gap:8px;max-width:480px;}
.reg-match{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);overflow:hidden;}
.reg-match-hdr{background:var(--s2);padding:5px 12px;font-size:10px;font-weight:600;color:var(--pu);letter-spacing:.05em;border-bottom:1px solid var(--b1);}
.reg-match-body{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center;padding:10px 14px;}
.reg-tm{font-size:13px;font-weight:500;}
.reg-tm.r{text-align:right;}
.reg-tm.winner{color:var(--gd);}
.reg-sc{font-size:16px;font-weight:700;font-family:monospace;background:var(--s2);border:1px solid var(--b1);padding:3px 12px;border-radius:6px;text-align:center;}
.reg-agg{text-align:center;font-size:10px;color:var(--t3);padding-bottom:8px;}
.reg-winner-banner{text-align:center;padding:12px;font-size:15px;font-weight:700;color:var(--gd);}

.empty{padding:28px;text-align:center;color:var(--t3);font-size:12px;}
.notif{position:fixed;bottom:20px;right:20px;background:var(--s1);border:1px solid var(--b2);border-radius:var(--rl);padding:10px 14px;font-size:12px;color:var(--t1);z-index:999;animation:su .3s ease;max-width:260px;box-shadow:0 8px 24px rgba(0,0,0,.5);}
@keyframes su{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.notif-title{font-weight:600;color:var(--gd);margin-bottom:2px;}
</style>
</head>
<body>
<div class="topbar">
  <div class="brand">🏙️ <span>Cidades</span>FC</div>
  <div class="state-tab active" id="stab-SP" onclick="switchState('SP')">São Paulo</div>
  <div class="state-tab" id="stab-RJ" onclick="switchState('RJ')">Rio de Janeiro</div>
  <div class="state-tab reg" id="stab-REG" onclick="switchState('REG')">🏆 Regional</div>
  <div class="top-right">
    <div class="pill gd" id="season-pill">Temporada 2024</div>
    <div class="pill" id="round-pill">—</div>
  </div>
</div>
<div class="main">
<div class="sidebar">
  <div id="sidebar-divs"></div>
  <div class="sep"></div>
  <div class="nav-item" id="nav-results" onclick="showContent('results')">⚽ Resultados</div>
  <div class="nav-item" id="nav-art" onclick="showContent('artilharia')">🥅 Artilharia</div>
  <div class="nav-item" id="nav-hist" onclick="showContent('historico')">📋 Histórico</div>
  <div class="sep"></div>
  <div class="sec-lbl">Simular</div>
  <div class="ctrl">
    <div class="spd-lbl">Velocidade</div>
    <div class="spd-row">
      <button class="spd" onclick="setSpd(80)">Lento</button>
      <button class="spd on" onclick="setSpd(35)">Normal</button>
      <button class="spd" onclick="setSpd(12)">Rápido</button>
      <button class="spd" onclick="setSpd(2)">Turbo</button>
    </div>
    <button class="btn btn-gd" id="btn-match" onclick="doAction('match')">▶ Próximo jogo</button>
    <button class="btn" id="btn-grid" onclick="doAction('grid')">⊞ Simular rodada</button>
    <button class="btn" id="btn-direto" onclick="doAction('direto')">⚡ Resultado direto</button>
    <button class="btn" id="btn-temp" onclick="doAction('temp')">⏭ Simular temporada</button>
    <button class="btn btn-gn vh" id="btn-next" onclick="doNextSeason()">→ Próxima temporada</button>
    <div class="rnd-hint" id="rnd-hint">—</div>
  </div>
</div>
<div class="content" id="main-content">
  <div class="ticker" id="ticker">
    <div class="tck-top">
      <div><div class="tck-dlbl" id="t-div">—</div><div class="tck-clock" id="t-clock">00'</div></div>
      <div style="text-align:right"><div style="font-size:11px;color:var(--t2)" id="t-round">—</div><div style="font-size:10px;color:var(--t3);margin-top:2px">ao vivo</div></div>
    </div>
    <div class="tck-match">
      <div class="tck-team" id="t-home">-</div>
      <div class="tck-score" id="t-score">0 × 0</div>
      <div class="tck-team aw" id="t-away">-</div>
    </div>
    <div class="tck-bar"><div class="tck-fill" id="t-fill" style="width:0%"></div></div>
    <div class="gfeed" id="t-feed"></div>
  </div>
  <div class="grid-mode" id="grid-mode">
    <div class="gm-top">
      <div style="font-size:12px;color:var(--t2)">Rodada <strong id="gm-round" style="color:var(--t1)">-</strong></div>
      <div class="gm-clock" id="gm-clock">00'</div>
    </div>
    <div class="gm-bar"><div class="gm-fill" id="gm-fill" style="width:0%"></div></div>
    <div id="gm-body"></div>
  </div>
  <div id="view-standings"></div>
  <div id="view-results" class="vh"></div>
  <div id="view-artilharia" class="vh"></div>
  <div id="view-historico" class="vh"></div>
  <div id="view-regional" class="vh"></div>
</div>

    });

}

function getPlayers(sig,team){return playerAssign[sig]?.[team]||[];}
function getScorer(sig,team){
  const pl=getPlayers(sig,team).filter(p=>p.posicao!=="GOL");
  return pl[Math.floor(Math.random()*pl.length)]||null;
}

// ── INIT ──
function initAll(){
  season=2024; historico=[];
  regional={available:false,prevSeason:null,participants:null,matchQueue:[],played:[],done:false};
  shufflePlayers();
  stateData={}; artStats={}; allResults={};
  for(const e of RAW.estados) initState(e);
  renderSidebar(); showContent("standings"); updPills();
  setNextBtn(false);

function initState(e){
  const sig=e.sigla, divs=DIV_NAMES;
  stateData[sig]={}; artStats[sig]={}; allResults[sig]={};
  // distribute 40 teams: A1=12,A2=10,B1=10,B2=8
  const teams=[...e.equipes];
  let idx=0;
  for(const dn of divs){
    const sz=DIV_SIZES[dn];
    const slice=teams.slice(idx,idx+sz); idx+=sz;
    stateData[sig][dn]={teams:slice.map(mkT),round:0,maxRounds:nRounds(sz),queue:[],lastRes:[],done:false};
    artStats[sig][dn]={};

  }
}

function mkT(name){return{name,pts:0,j:0,v:0,e:0,d:0,gp:0,gc:0,sg:0};}
function sortD(arr){arr.sort((a,b)=>b.pts-a.pts||b.sg-a.sg||b.gp-a.gp||a.name.localeCompare(b.name));}

// ── MATCH SIM ──
function simMatch(home,away,sig,dn){
  const total=Math.floor(Math.random()*6);
  const mins=Array.from({length:total},()=>Math.floor(Math.random()*90)+1).sort((a,b)=>a-b);
  let gh=0,ga=0; const goals=[];
  for(const min of mins){
    const isH=Math.random()<0.5;
    const teamName=isH?home.name:away.name;
    const scorer=getScorer(sig,teamName);
    const nick=scorer?scorer.apelido:null;
    if(nick){
      if(!artStats[sig][dn][teamName]) artStats[sig][dn][teamName]={};
      if(!artStats[sig][dn][teamName][nick]) artStats[sig][dn][teamName][nick]={gols:0,assist:0,nome:scorer.nome+" "+scorer.sobrenome};
      artStats[sig][dn][teamName][nick].gols++;
      // assist: random other player
      const others=getPlayers(sig,teamName).filter(p=>p.posicao!=="GOL"&&p.apelido!==nick);
      if(others.length){
        const ass=others[Math.floor(Math.random()*others.length)];
        if(!artStats[sig][dn][teamName][ass.apelido]) artStats[sig][dn][teamName][ass.apelido]={gols:0,assist:0,nome:ass.nome+" "+ass.sobrenome};
        artStats[sig][dn][teamName][ass.apelido].assist++;
        goals.push({min,side:isH?"home":"away",nick,team:teamName,assist:ass.apelido});
      } else {
        goals.push({min,side:isH?"home":"away",nick,team:teamName,assist:null});
      }
    } else {
      goals.push({min,side:isH?"home":"away",nick:null,team:teamName,assist:null});
    }
    if(isH)gh++;else ga++;
  }
  if(gh>ga){home.v++;away.d++;home.pts+=3;}
  else if(ga>gh){away.v++;home.d++;away.pts+=3;}
  else{home.e++;away.e++;home.pts+=1;away.pts+=1;}
  home.j++;away.j++;home.gp+=gh;home.gc+=ga;home.sg=home.gp-home.gc;
  away.gp+=ga;away.gc+=gh;away.sg=away.gp-away.gc;
  return{home:home.name,away:away.name,gh,ga,goals};
}

function getPairs(teams,rnd){
  const n=teams.length,pivot=teams[0],rest=teams.slice(1);
  const off=(rnd-1)%(n-1);
  const rot=rest.slice(off).concat(rest.slice(0,off));
  const all=[pivot,...rot],pairs=[];
  for(let i=0;i<n/2;i++) pairs.push([all[i],all[n-1-i]]);
  return pairs;
}

function buildQueue(sig,dn){
  const d=stateData[sig][dn];
  return getPairs(d.teams,d.round).map(([a,b])=>({sig,dn,home:a,away:b}));
}

function prepRound(sig,dn){
  const d=stateData[sig][dn];
  if(!d.queue.length&&!d.done){
    d.round++;
    d.lastRes=[];
    d.queue=buildQueue(sig,dn);
    if(!allResults[sig][dn]) allResults[sig][dn]={};
    allResults[sig][dn][d.round]=[];
    renderSidebar(); updPills();
  }
}

function checkDivDone(sig,dn){
  const d=stateData[sig][dn];
  if(d.round>=d.maxRounds&&!d.queue.length&&!d.done){
    d.done=true;
    renderSidebar();
    checkAllDone();
  }
}

function checkAllDone(){
  let done=true;
  for(const e of RAW.estados) for(const dn of DIV_NAMES) if(!stateData[e.sigla][dn].done){done=false;break;}
  if(done) setNextBtn(true);
}

// ── ACTIONS DISPATCHER ──
function doAction(type){

function hideTicker(){clearInterval(tickIv);tickIv=null;document.getElementById("ticker").classList.remove("on");}
function hideGrid(){clearInterval(gridIv);gridIv=null;document.getElementById("grid-mode").classList.remove("on");}

// ── BRASFOOT ──
function playTicker(item,label,onDone){
  const{sig,dn,home,away}=item;
  const result=simMatch(home,away,sig,dn);
  hideTicker();hideGrid();
  const el=document.getElementById("ticker");el.classList.add("on");
  document.getElementById("t-div").textContent=label;
  document.getElementById("t-round").textContent=dn?`Rodada ${stateData[sig]?.[dn]?.round||""}`:label;
  document.getElementById("t-home").textContent=home.name||home;
  document.getElementById("t-away").textContent=away.name||away;
  document.getElementById("t-score").textContent="0 × 0";
  document.getElementById("t-feed").innerHTML="";
  document.getElementById("t-fill").style.width="0%";
  let elapsed=0,gh=0,ga=0;const goals=[...result.goals];
  clearInterval(tickIv);
  tickIv=setInterval(()=>{
    elapsed++;
    document.getElementById("t-clock").textContent=String(elapsed).padStart(2,"0")+"'";
    document.getElementById("t-fill").style.width=(elapsed/90*100)+"%";
    while(goals.length&&goals[0].min<=elapsed){
      const g=goals.shift();
      if(g.side==="home")gh++;else ga++;
      document.getElementById("t-score").textContent=`${gh} × ${ga}`;
      const feed=document.getElementById("t-feed");
      const ev=document.createElement("div");ev.className="gev";
      const who=g.nick?`${g.nick} (${g.team})`:(g.team||"");
      ev.innerHTML=`<span class="gmin">${g.min}'</span><span>⚽</span><span style="color:var(--t2)">${who}</span>`;
      feed.prepend(ev);
    }
    if(elapsed>=90){clearInterval(tickIv);tickIv=null;onDone(result);}
  },tickSpd);
  return result;
}

function doNextMatch(){
  prepRound(curState,curDiv);
  const d=stateData[curState][curDiv];
  if(!d.queue.length)return;
  setBusy(true);
  const item=d.queue.shift();
  playTicker(item,`${curState} — ${curDiv}`,(result)=>{
    d.lastRes.push(result);
    if(allResults[curState][curDiv][d.round]) allResults[curState][curDiv][d.round].push(result);
    sortD(d.teams);renderStandings();setBusy(false);
    if(!d.queue.length)checkDivDone(curState,curDiv);
  });
}

// ── DIRETO ──
function doDireto(){
  prepRound(curState,curDiv);
  const d=stateData[curState][curDiv],sig=curState,dn=curDiv;
  if(!d.queue.length)return;
  hideTicker();hideGrid();
  const items=[...d.queue];d.queue=[];d.lastRes=[];
  if(!allResults[sig][dn][d.round]) allResults[sig][dn][d.round]=[];
  for(const item of items){
    const r=simMatch(item.home,item.away,sig,dn);
    d.lastRes.push(r);allResults[sig][dn][d.round].push(r);
  }
  sortD(d.teams);renderStandings();
  checkDivDone(sig,dn);
  if(curContent==="standings") showContent("results");
  else renderResults();
}

// ── TEMP ──
function doTemp(){
  const sig=curState,dn=curDiv,d=stateData[sig][dn];
  if(d.done)return;
  setBusy(true);hideTicker();hideGrid();
  // finish current partial round
  if(d.queue.length){
    if(!allResults[sig][dn][d.round]) allResults[sig][dn][d.round]=[];
    for(const item of d.queue){const r=simMatch(item.home,item.away,sig,dn);d.lastRes.push(r);allResults[sig][dn][d.round].push(r);}
    d.queue=[];sortD(d.teams);
  }
  while(d.round<d.maxRounds){
    d.round++;d.lastRes=[];
    const q=buildQueue(sig,dn);
    if(!allResults[sig][dn][d.round]) allResults[sig][dn][d.round]=[];
    for(const item of q){const r=simMatch(item.home,item.away,sig,dn);d.lastRes.push(r);allResults[sig][dn][d.round].push(r);}
    sortD(d.teams);
  }
  d.done=true;renderSidebar();renderStandings();setBusy(false);
  checkAllDone();
  notif(`${sig} ${dn} concluída!`,`Campeão: ${d.teams[0].name}`);
}

// ── NEXT SEASON ──
function doNextSeason(){
  // Save history
  const campMap={},promoMap={},rebMap={};
  for(const e of RAW.estados){
    const sig=e.sigla;campMap[sig]={};promoMap[sig]={};rebMap[sig]={};
    for(const dn of DIV_NAMES){
      const d=stateData[sig][dn];
      campMap[sig][dn]=d.teams[0]?.name;
      promoMap[sig][dn]=d.teams.slice(0,DIV_PROMO[dn]).map(t=>t.name);
      rebMap[sig][dn]=DIV_REB[dn]?d.teams.slice(d.teams.length-DIV_REB[dn]).map(t=>t.name):[];
    }
  }
  historico.push({season,campMap,promoMap,rebMap});

  // Setup regional participants from this season
  const spT=stateData["SP"]["A1"].teams;
  const rjT=stateData["RJ"]["A1"].teams;
  regional={
    available:true,prevSeason:season,
    participants:{sp1:spT[0].name,sp2:spT[1].name,rj1:rjT[0].name,rj2:rjT[1].name},
    matchQueue:[],played:[],done:false
  };
  buildRegionalQueue();

  // Rebuild divisions with correct promotion/relegation
  // Logic: for each state, collect names in order per div, apply reb/promo
  for(const e of RAW.estados){
    const sig=e.sigla;
    // Current standings per div
    const standings={};
    for(const dn of DIV_NAMES) standings[dn]=[...stateData[sig][dn].teams.map(t=>t.name)];
    
    const newDivs={};
    for(let i=0;i<DIV_NAMES.length;i++){
      const dn=DIV_NAMES[i];
      const rebN=DIV_REB[dn];
      const promoN=DIV_PROMO[dn]; // teams moving up FROM this div
      
      // Survivors: remove relegated (bottom rebN) and promoted (top promoN, but only for A2,B1,B2)
      const all=standings[dn];
      const relegated=rebN>0?all.slice(all.length-rebN):[];
      const promoted=i>0?all.slice(0,promoN):[];// A1 has no promotion upward
      
      // Survivors stay in same div
      let survivors=[...all];
      if(rebN>0) survivors=survivors.slice(0,all.length-rebN);
      if(i>0) survivors=survivors.slice(promoN); // remove promoted
      
      newDivs[dn]=survivors;
    }
    
    // Now add promoted (from lower div going up) and relegated (from upper div going down)
    for(let i=0;i<DIV_NAMES.length;i++){
      const dn=DIV_NAMES[i];
      // Add relegated from div above (if exists)
      if(i>0){
        const aboveDn=DIV_NAMES[i-1];
        const rebFromAbove=DIV_REB[aboveDn];
        if(rebFromAbove>0){
          const relegated=standings[aboveDn].slice(standings[aboveDn].length-rebFromAbove);
          newDivs[dn]=[...newDivs[dn],...relegated];
        }
      }
      // Add promoted from div below (if exists)
      if(i<DIV_NAMES.length-1){
        const belowDn=DIV_NAMES[i+1];
        const promoFromBelow=DIV_PROMO[belowDn];
        if(promoFromBelow>0){
          const promoted=standings[belowDn].slice(0,promoFromBelow);
          newDivs[dn]=[...newDivs[dn],...promoted];
        }
      }
    }
    
    // Verify sizes
    for(const dn of DIV_NAMES){
      const expected=DIV_SIZES[dn];
      if(newDivs[dn].length!==expected){
        console.warn(`${sig} ${dn}: expected ${expected}, got ${newDivs[dn].length}`,newDivs[dn]);
      }
    }
    
    // Re-init state with new team order
    artStats[sig]={}; allResults[sig]={};
    for(const dn of DIV_NAMES){
      stateData[sig][dn]={
        teams:newDivs[dn].map(mkT),
        round:0,maxRounds:nRounds(DIV_SIZES[dn]),
        queue:[],lastRes:[],done:false
      };
      artStats[sig][dn]={};
      allResults[sig][dn]={};
    }
  }

  season++;
  setNextBtn(false);
  renderSidebar();renderStandings();renderHistorico();updPills();
  notif(`Temporada ${season} iniciada!`,`Regional ${season-1} disponível`);
}

// ── REGIONAL ──
function buildRegionalQueue(){
  const p=regional.participants;
  // Semi 1: SP1 vs RJ2 (ida: SP1 home, volta: RJ2 home)
  // Semi 2: RJ1 vs SP2 (ida: RJ1 home, volta: SP2 home)
  // Final: winner1 vs winner2
  regional.matchQueue=[
    {phase:"Semifinal 1 — Ida",home:p.sp1,away:p.rj2,sig:null,isReg:true,semi:1,leg:1},
    {phase:"Semifinal 1 — Volta",home:p.rj2,away:p.sp1,sig:null,isReg:true,semi:1,leg:2},
    {phase:"Semifinal 2 — Ida",home:p.rj1,away:p.sp2,sig:null,isReg:true,semi:2,leg:1},
    {phase:"Semifinal 2 — Volta",home:p.sp2,away:p.rj1,sig:null,isReg:true,semi:2,leg:2},
    // Final TBD — will be added after semis
  ];
}

function simRegMatch(home,away){
  const total=Math.floor(Math.random()*5);
  const mins=Array.from({length:total},()=>Math.floor(Math.random()*90)+1).sort((a,b)=>a-b);
  let gh=0,ga=0,goals=[];
  for(const min of mins){if(Math.random()<0.5)gh++;else ga++;goals.push({min,side:gh>ga?"home":"away"});}
  // re-calculate properly
  gh=0;ga=0;goals=[];
  for(let i=0;i<total;i++){
    const min=mins[i],isH=Math.random()<0.5;
    if(isH)gh++;else ga++;
    goals.push({min,side:isH?"home":"away"});
  }
  return{home,away,gh,ga,goals};
}

function doRegAction(type){
  if(!regional.available){notif("Regional","Conclua a temporada primeiro.");return;}
  if(regional.done){notif("Regional","Regional já encerrado.");return;}
  if(regBusy)return;
  
  if(type==="match") doRegNextMatch();
  else if(type==="grid"||type==="direto"||type==="temp") doRegAllInstant();
}

function doRegNextMatch(){
  if(!regional.matchQueue.length){
    if(tryBuildFinal()) doRegNextMatch();
    return;
  }
  regBusy=true;setBusy(true);
  const item={...regional.matchQueue[0]};
  regional.matchQueue.shift();
  const result=simRegMatch(item.home,item.away);
  const played={...item,gh:result.gh,ga:result.ga};
  regional.played.push(played);
  
  // play ticker
  const fakeSig="SP",fakeDn="A1";
  const fakeHome={name:item.home};const fakeAway={name:item.away};
  hideTicker();hideGrid();
  const el=document.getElementById("ticker");el.classList.add("on");
  document.getElementById("t-div").textContent=`Regional ${regional.prevSeason} — ${item.phase}`;
  document.getElementById("t-round").textContent=item.phase;
  document.getElementById("t-home").textContent=item.home;
  document.getElementById("t-away").textContent=item.away;
  document.getElementById("t-score").textContent="0 × 0";
  document.getElementById("t-feed").innerHTML="";
  document.getElementById("t-fill").style.width="0%";
  let elapsed=0,gh=0,ga=0;const goals=[...result.goals];
  clearInterval(tickIv);
  tickIv=setInterval(()=>{
    elapsed++;
    document.getElementById("t-clock").textContent=String(elapsed).padStart(2,"0")+"'";
    document.getElementById("t-fill").style.width=(elapsed/90*100)+"%";
    while(goals.length&&goals[0].min<=elapsed){
      const g=goals.shift();
      if(g.side==="home")gh++;else ga++;
      document.getElementById("t-score").textContent=`${gh} × ${ga}`;
      const feed=document.getElementById("t-feed");
      const ev=document.createElement("div");ev.className="gev";
      const teamName=g.side==="home"?item.home:item.away;
      ev.innerHTML=`<span class="gmin">${g.min}'</span><span>⚽</span><span style="color:var(--t2)">${teamName}</span>`;
      feed.prepend(ev);
    }
    if(elapsed>=90){
      clearInterval(tickIv);tickIv=null;
      regBusy=false;setBusy(false);
      tryBuildFinal();
      checkRegDone();
      if(curContent==="regional")renderRegional();
    }
  },tickSpd);
}

function tryBuildFinal(){
  // Check if both semis are done and final not yet queued
  const semi1=regional.played.filter(m=>m.semi===1);
  const semi2=regional.played.filter(m=>m.semi===2);
  const finalPlayed=regional.played.find(m=>m.phase==="Final");
  const finalQueued=regional.matchQueue.find(m=>m.phase==="Final");
  if(semi1.length===2&&semi2.length===2&&!finalPlayed&&!finalQueued){
    // determine finalists
    const s1_agg_h=semi1[0].gh+semi1[1].ga,s1_agg_a=semi1[0].ga+semi1[1].gh;
    const fin1=s1_agg_h>s1_agg_a?regional.participants.sp1:s1_agg_a>s1_agg_h?regional.participants.rj2:Math.random()<0.5?regional.participants.sp1:regional.participants.rj2;
    const s2_agg_h=semi2[0].gh+semi2[1].ga,s2_agg_a=semi2[0].ga+semi2[1].gh;
    const fin2=s2_agg_h>s2_agg_a?regional.participants.rj1:s2_agg_a>s2_agg_h?regional.participants.sp2:Math.random()<0.5?regional.participants.rj1:regional.participants.sp2;
    regional.matchQueue.push({phase:"Final",home:fin1,away:fin2,isReg:true,semi:0,leg:0});
    return true;
  }
  return false;
}

function checkRegDone(){
  const finalPlayed=regional.played.find(m=>m.phase==="Final");
  if(finalPlayed){
    regional.done=true;
    regional.winner=finalPlayed.gh>finalPlayed.ga?finalPlayed.home:finalPlayed.ga>finalPlayed.gh?finalPlayed.away:Math.random()<0.5?finalPlayed.home:finalPlayed.away;
    notif("🏆 Campeão Regional!",regional.winner);
  }
}

function doRegAllInstant(){
  if(!regional.available||regional.done)return;
  // play all remaining instantly
  hideTicker();hideGrid();
  while(regional.matchQueue.length){
    const item=regional.matchQueue.shift();
    const result=simRegMatch(item.home,item.away);
    regional.played.push({...item,gh:result.gh,ga:result.ga});
    tryBuildFinal();
  }
  checkRegDone();
  renderRegional();
}

// ── RENDER SIDEBAR ──
function renderSidebar(){
  let html="<div class='sec-lbl'>Divisões</div>";
  if(curState==="REG"){
    html+="<div class='nav-item' style='color:var(--pu)'>Copa Regional</div>";
  } else {
    const e=RAW.estados.find(x=>x.sigla===curState);
    if(e) for(const dn of DIV_NAMES){
      const d=stateData[curState]?.[dn];
      const active=(curContent==="standings"&&curDiv===dn)?"active":"";
      const badge=d?.done?"✓":`${d?.round||0}/${d?.maxRounds||0}`;
      html+=`<div class="nav-item ${active}" onclick="switchDiv('${dn}')">
        <span class="dot" style="background:${DIV_COLOR[dn]}"></span>${dn}
        <span class="rbadge">${badge}</span>
      </div>`;
    }
  }
  document.getElementById("sidebar-divs").innerHTML=html;
  // highlight static nav items
  ["results","art","hist"].forEach(id=>{
    const el=document.getElementById("nav-"+id);
    if(el) el.classList.toggle("active",curContent===id||(id==="art"&&curContent==="artilharia")||(id==="hist"&&curContent==="historico"));
  });
  document.getElementById("nav-results").classList.toggle("active",curContent==="results");
  document.getElementById("nav-art").classList.toggle("active",curContent==="artilharia");
  document.getElementById("nav-hist").classList.toggle("active",curContent==="historico");
}

// ── SHOW CONTENT ──
function showContent(type){
  curContent=type;
  ["standings","results","artilharia","historico","regional"].forEach(v=>{
    document.getElementById("view-"+v).classList.toggle("vh",v!==type);
  });
  // Hide ticker/grid when not in standings
  if(type!=="standings"&&type!=="regional"){hideTicker();hideGrid();}
  // Buttons only active for standings or regional
  const simActive=type==="standings"||type==="regional";
  ["btn-match","btn-grid","btn-direto","btn-temp"].forEach(id=>document.getElementById(id).disabled=!simActive||busy);
  renderSidebar();
  if(type==="standings") renderStandings();
  if(type==="results") renderResults();
  if(type==="artilharia") renderArtilharia();
  if(type==="historico") renderHistorico();
  if(type==="regional") renderRegional();
  updPills();
}

function switchDiv(dn){curDiv=dn;showContent("standings");}
function switchState(sig){
  curState=sig;
  if(sig==="REG"){showContent("regional");}
  else{curDiv=DIV_NAMES[0];showContent("standings");}
  document.querySelectorAll(".state-tab").forEach(el=>el.classList.remove("active"));
  document.getElementById("stab-"+(sig==="REG"?"REG":sig)).classList.add("active");
}

// ── RENDER STANDINGS ──
function renderStandings(){
  if(curContent!=="standings")return;
  const sig=curState,dn=curDiv;
  const d=stateData[sig]?.[dn];
  if(!d){document.getElementById("view-standings").innerHTML="";return;}
  const teams=d.teams;
  const rebN=DIV_REB[dn],promoUp=dn==="A1"?0:DIV_PROMO[dn];
  const isA1=dn==="A1";
  
  // Next round fixtures
  const nxtRnd=d.round+1;
  const nxtPairs=nxtRnd<=d.maxRounds?getPairs(teams,nxtRnd):[];

  let legend=``;
  if(isA1) legend+=`<div class="leg-item"><div class="leg-dot" style="background:var(--pu)"></div>Regional (top 2)</div>`;
  if(!isA1) legend+=`<div class="leg-item"><div class="leg-dot" style="background:var(--gn)"></div>Acesso</div>`;
  if(rebN) legend+=`<div class="leg-item"><div class="leg-dot" style="background:var(--rd)"></div>Rebaixamento</div>`;

  const rows=teams.map((t,i)=>{
    const pos=i+1;
    let rowCls="",barCls="bn";
    if(isA1&&pos<=2){rowCls="rpu";barCls="bpu";}
    else if(!isA1&&promoUp&&pos<=promoUp){rowCls="rp";barCls="bp";}
    else if(rebN&&pos>teams.length-rebN){rowCls="rr";barCls="br";}
    const sgc=t.sg>0?"sgp":t.sg<0?"sgn":"";
    return`<tr class="${rowCls}"><td class="posc ${barCls}">${pos}</td><td class="nc">${t.name}</td>
      <td class="ptsc">${t.pts}</td><td>${t.j}</td><td>${t.v}</td><td>${t.e}</td><td>${t.d}</td>
      <td>${t.gp}</td><td>${t.gc}</td><td class="${sgc}">${t.sg>0?"+":""}${t.sg}</td></tr>`;
  }).join("");

  const fixList=nxtPairs.length
    ?nxtPairs.map(([a,b])=>`<div class="fix-item"><span class="fix-home">${a.name}</span><span class="fix-vs">×</span><span class="fix-away">${b.name}</span></div>`).join("")
    :"<div class='empty'>—</div>";

  document.getElementById("view-standings").innerHTML=`
    <div class="slay">
      <div>
        <div class="div-hdr"><div class="div-dot-lg" style="background:${DIV_COLOR[dn]}"></div><div class="div-title">${RAW.estados.find(e=>e.sigla===sig)?.nome} — Série ${dn}</div></div>
        <div class="leg">${legend}</div>
        <div class="tbl-wrap"><table>
          <thead><tr><th class="pc">#</th><th class="nc">Cidade</th><th>Pts</th><th>J</th><th>V</th><th>E</th><th>D</th><th>GP</th><th>GC</th><th>SG</th></tr></thead>
          <tbody>${rows}</tbody>
        </table></div>
      </div>
      <div>
        <div class="fix-panel">
          <div class="fix-hdr">Próximos jogos <span class="fix-round">${nxtRnd<=d.maxRounds?"· Rodada "+nxtRnd:"· Temporada encerrada"}</span></div>
          <div class="fix-list">${fixList}</div>
        </div>
      </div>
    </div>`;
}

// ── RENDER RESULTS ──
function renderResults(){
  // Build filter options
  const divOpts=DIV_NAMES.map(dn=>`<option value="${dn}">${dn}</option>`).join("");
  // Get max round for selected state/div
  const savedDiv=curDiv;
  let html=`<div class="filter-bar">
    <span class="filter-label">Estado:</span>
    <select class="filter-select" id="res-sig" onchange="renderResults()">
      ${RAW.estados.map(e=>`<option value="${e.sigla}"${e.sigla===curState?" selected":""}>${e.nome}</option>`).join("")}
    </select>
    <span class="filter-label">Divisão:</span>
    <select class="filter-select" id="res-dn" onchange="renderResults()">${divOpts}</select>
    <span class="filter-label">Rodada:</span>
    <select class="filter-select" id="res-rnd" onchange="renderResultsFiltered()"><option value="">— Selecione —</option></select>
  </div><div id="res-body"></div>`;
  document.getElementById("view-results").innerHTML=html;
  // set defaults and populate rounds
  populateResRounds();
}

function populateResRounds(){
  const sigEl=document.getElementById("res-sig");
  const dnEl=document.getElementById("res-dn");
  const rndEl=document.getElementById("res-rnd");
  if(!sigEl||!dnEl||!rndEl)return;
  const sig=sigEl.value,dn=dnEl.value;
  const rounds=Object.keys(allResults[sig]?.[dn]||{}).filter(r=>allResults[sig][dn][r]?.length>0).map(Number).sort((a,b)=>a-b);
  const lastRnd=rounds[rounds.length-1]||"";
  rndEl.innerHTML=`<option value="">— Selecione —</option>`+rounds.map(r=>`<option value="${r}"${r===lastRnd?" selected":""}>${r}</option>`).join("");
  if(lastRnd) renderResultsFiltered();
  else document.getElementById("res-body").innerHTML=`<div class="empty">Selecione uma rodada para ver os resultados.</div>`;
}

function renderResultsFiltered(){
  const sig=document.getElementById("res-sig")?.value;
  const dn=document.getElementById("res-dn")?.value;
  const rnd=parseInt(document.getElementById("res-rnd")?.value);
  const body=document.getElementById("res-body");
  if(!sig||!dn||!rnd){body.innerHTML=`<div class="empty">Selecione uma rodada.</div>`;return;}
  const results=(allResults[sig]?.[dn]?.[rnd])||[];
  if(!results.length){body.innerHTML=`<div class="empty">Nenhum resultado para esta rodada.</div>`;return;}
  let html=`<div class="res-dlbl">${dn} — Rodada ${rnd}</div><div class="res-grid">`;
  for(const r of results){
    const hw=r.gh>r.ga,aw=r.ga>r.gh;
    html+=`<div class="rc"><div class="rc-row">
      <span class="rc-n ${hw?"rc-w":""}">${r.home}</span>
      <span class="rc-sc">${r.gh}×${r.ga}</span>
      <span class="rc-n aw ${aw?"rc-w":""}">${r.away}</span>
    </div></div>`;
  }
  html+="</div>";
  body.innerHTML=html;
}

// ── ARTILHARIA ──
let artDiv="A1";
function renderArtilharia(){
  const tabs=DIV_NAMES.map(dn=>`<button class="art-ftab${dn===artDiv?" on":""}" onclick="artDiv='${dn}';renderArtilharia()">${dn}</button>`).join("");
  let gols=[],assists=[];
  for(const e of RAW.estados){
    const sig=e.sigla;
    for(const[team,players]of Object.entries(artStats[sig]?.[artDiv]||{})){
      for(const[nick,stats]of Object.entries(players)){
        const nome=stats.nome||nick;
        if(stats.gols>0) gols.push({nick,nome,team,sig,val:stats.gols});
        if(stats.assist>0) assists.push({nick,nome,team,sig,val:stats.assist});
      }
    }
  }
  gols.sort((a,b)=>b.val-a.val);assists.sort((a,b)=>b.val-a.val);
  const top=15;
  const mkList=(arr,valCls)=>arr.slice(0,top).map((x,i)=>`
    <div class="art-row">
      <span class="art-pos">${i+1}</span>
      <div class="art-info"><div class="art-nick">${x.nick}</div><div class="art-sub">${x.nome} · ${x.team} (${x.sig})</div></div>
      <span class="art-val ${valCls}">${x.val}</span>
    </div>`).join("");
  document.getElementById("view-artilharia").innerHTML=`
    <div class="div-title" style="margin-bottom:12px">Artilharia & Assistências</div>
    <div class="art-filter">${tabs}</div>
    <div class="art-grid">
      <div class="art-card"><div class="art-hdr">⚽ Artileiros — ${artDiv}</div>${gols.length?mkList(gols,""):"<div class='empty'>Nenhum gol ainda.</div>"}</div>
      <div class="art-card"><div class="art-hdr">🎯 Assistências — ${artDiv}</div>${assists.length?mkList(assists,"gn"):"<div class='empty'>Nenhuma assistência ainda.</div>"}</div>
    </div>`;
}

// ── HISTORICO ──
function renderHistorico(){
  const c=document.getElementById("view-historico");
  if(!historico.length){c.innerHTML="<div class='empty'>Nenhuma temporada concluída.</div>";return;}
  c.innerHTML=[...historico].reverse().map(h=>`
    <div class="hist-card">
      <div class="hist-hdr">Temporada ${h.season}</div>
      ${RAW.estados.map(e=>DIV_NAMES.map(dn=>`
        <div class="hist-row">
          <span class="hist-lbl">Campeão ${e.sigla} ${dn}</span>
          <span class="hist-val gd">${h.campMap[e.sigla]?.[dn]||"—"}</span>
        </div>`).join("")).join("")}
    </div>`).join("");
}

// ── REGIONAL ──
function renderRegional(){
  const el=document.getElementById("view-regional");
  let html=`<div class="div-title" style="color:var(--pu);margin-bottom:12px">🏆 Copa Regional SP × RJ</div>`;
  if(!regional.available){
    html+=`<div class="reg-info-box">O Regional usa os 2 primeiros da A1 de cada estado ao fim da temporada. Conclua a temporada atual para desbloquear.</div>`;
  } else {
    const p=regional.participants;
    html+=`<div class="reg-info-box">Temporada <strong>${regional.prevSeason}</strong> &nbsp;·&nbsp; 
      SP: <strong style="color:var(--gd)">${p.sp1}</strong> e <strong style="color:var(--gd)">${p.sp2}</strong> &nbsp;·&nbsp; 
      RJ: <strong style="color:var(--bl)">${p.rj1}</strong> e <strong style="color:var(--bl)">${p.rj2}</strong><br>
      <span style="color:var(--t3);font-size:11px">Semis: ${p.sp1} × ${p.rj2} &nbsp;|&nbsp; ${p.rj1} × ${p.sp2} &nbsp;·&nbsp; Final: jogo único</span>
    </div>`;
    
    if(!regional.played.length){
      html+=`<div class="empty" style="margin-top:8px">Use os botões laterais para simular o Regional.</div>`;
    } else {
      html+=`<div class="reg-matches">`;
      for(const m of regional.played){
        const winHome=m.gh>m.ga,winAway=m.ga>m.gh;
        html+=`<div class="reg-match">
          <div class="reg-match-hdr">${m.phase}</div>
          <div class="reg-match-body">
            <span class="reg-tm r${winHome?" winner":""}">${m.home}</span>
            <span class="reg-sc">${m.gh} × ${m.ga}</span>
            <span class="reg-tm${winAway?" winner":""}">${m.away}</span>
          </div>`;
        if(m.phase.includes("Volta")){
          // show aggregate
          const semi=m.semi;
          const played=regional.played.filter(x=>x.semi===semi);
          if(played.length===2){
            const agg_h=played[0].gh+played[1].ga,agg_a=played[0].ga+played[1].gh;
            const winner=agg_h>agg_a?played[0].home:agg_a>agg_h?played[0].away:"Pênaltis";
            html+=`<div class="reg-agg">Agg: ${agg_h} × ${agg_a} &nbsp;·&nbsp; Classificado: <strong style="color:var(--gd)">${winner}</strong></div>`;
          }
        }
        if(m.phase==="Final"){
          const winner=m.gh>m.ga?m.home:m.ga>m.gh?m.away:"Pênaltis (sorteio)";
          html+=`<div class="reg-winner-banner">🏆 Campeão Regional: ${winner}</div>`;
        }
        html+="</div>";
      }
      html+="</div>";
      if(!regional.done&&regional.matchQueue.length){
        html+=`<div style="font-size:12px;color:var(--t3);margin-top:10px">Próximo: <strong style="color:var(--t2)">${regional.matchQueue[0]?.phase||""}</strong></div>`;
      }
    }
  }
  el.innerHTML=html;
}

// ── UTILS ──
function updPills(){
  document.getElementById("season-pill").textContent=`Temporada ${season}`;
  if(curState!=="REG"&&curContent==="standings"){
    const d=stateData[curState]?.[curDiv];
    document.getElementById("round-pill").textContent=d?`${curState} ${curDiv} · ${d.round}/${d.maxRounds}`:"—";
    document.getElementById("rnd-hint").innerHTML=`Rodada <strong>${d?.round||0}</strong> / ${d?.maxRounds||0}`;
  } else {
    document.getElementById("round-pill").textContent="—";
    document.getElementById("rnd-hint").textContent="—";
  }
}

function setSpd(ms){
  tickSpd=ms;
  document.querySelectorAll(".spd").forEach((b,i)=>b.classList.toggle("on",[80,35,12,2][i]===ms));
}

function notif(title,body){
  const el=document.createElement("div");el.className="notif";
  el.innerHTML=`<div class="notif-title">${title}</div><div style="color:var(--t2);font-size:11px">${body}</div>`;
  document.body.appendChild(el);setTimeout(()=>el.remove(),4000);
}

initAll();
</script>
